<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作文素材坊 · 高考作文素材收集与交流</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- 配置缺失提示 -->
  <div id="config-warn" hidden></div>

  <!-- 登录 / 注册 -->
  <div id="auth" class="auth-wrap" hidden>
    <div class="auth-card">
      <h1>作文素材坊</h1>
      <p class="sub">高考作文素材收集与交流平台</p>
      <div class="tabs">
        <button class="tab active" data-tab="login">登录</button>
        <button class="tab" data-tab="register">注册</button>
      </div>
      <form id="login-form" class="auth-form">
        <input name="username" placeholder="用户名" required autocomplete="username">
        <input name="password" type="password" placeholder="密码" required autocomplete="current-password">
        <button type="submit">登录</button>
      </form>
      <form id="register-form" class="auth-form" hidden>
        <input name="username" placeholder="用户名（字母/数字）" required autocomplete="username">
        <input name="displayName" placeholder="昵称（可选）">
        <input name="password" type="password" placeholder="密码（至少 6 位）" required autocomplete="new-password">
        <button type="submit">注册</button>
        <p class="hint">注册即为学生账号；教师账号请联系管理员开通。</p>
      </form>
      <p class="hint" id="auth-hint"></p>
    </div>
  </div>

  <!-- 顶部导航 -->
  <header id="nav" hidden>
    <div class="brand">作文素材坊</div>
    <nav>
      <a data-view="home" class="active">主页</a>
      <a data-view="my">我的</a>
      <a data-view="review" id="nav-review" hidden>教师审核</a>
    </nav>
    <div class="nav-right">
      <span id="nav-user"></span>
      <button id="btn-publish" class="btn-primary">发布素材</button>
      <button id="btn-logout" class="btn-ghost">退出</button>
    </div>
  </header>

  <!-- 主内容 -->
  <main id="app-main" hidden>
    <section id="view-home" class="view">
      <div class="page-head">
        <h2>作文素材广场</h2>
      </div>
      <div class="search-bar">
        <input id="home-search" type="search" placeholder="🔍 搜索标题、内容、标签或作者…" autocomplete="off">
      </div>
      <div id="cards" class="card-grid"></div>
    </section>

    <section id="view-my" class="view" hidden>
      <div class="page-head">
        <h2>个人中心</h2>
        <button class="btn-primary" data-action="publish">+ 发布素材</button>
      </div>
      <h3 class="block-title">我收藏的素材</h3>
      <div id="my-fav" class="card-grid"></div>
      <h3 class="block-title">我发布的素材</h3>
      <div id="my-mat" class="mat-list"></div>
    </section>

    <section id="view-review" class="view" hidden>
      <div class="page-head"><h2>待审核素材</h2><p>教师通过后将展示在主页</p></div>
      <div id="review-list" class="mat-list"></div>
    </section>
  </main>

  <div id="modal-root"></div>
  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=3"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
