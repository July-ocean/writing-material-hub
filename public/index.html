<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作文素材坊 · 高考作文素材收集与交流</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

  <!-- 登录 / 注册 -->
  <div id="auth" class="auth-wrap" hidden>
    <div class="auth-card">
      <h1>作文素材坊</h1>
      <p class="sub">高考作文素材收集与交流平台</p>
      <div class="tabs">
        <button class="tab active" data-tab="login">登录</button>
        <button class="tab" data-tab="register">注册</button>
      </div>
      <form id="login-form" class="auth-form">
        <input name="username" placeholder="用户名" required>
        <input name="password" type="password" placeholder="密码" required>
        <button type="submit">登录</button>
      </form>
      <form id="register-form" class="auth-form" hidden>
        <input name="username" placeholder="用户名" required>
        <input name="displayName" placeholder="昵称（可选）">
        <select name="role">
          <option value="student">学生</option>
          <option value="teacher">教师</option>
        </select>
        <input name="password" type="password" placeholder="密码（至少 6 位）" required>
        <button type="submit">注册</button>
      </form>
      <p class="hint">演示账号：teacher / 123456（教师）　student / 123456（学生）</p>
    </div>
  </div>

  <!-- 顶部导航 -->
  <header id="nav" hidden>
    <div class="brand">作文素材坊</div>
    <nav>
      <a data-view="home" class="active">主页</a>
      <a data-view="my">我的</a>
      <a data-view="review" id="nav-review" hidden>教师审核</a>
    </nav>
    <div class="nav-right">
      <span id="nav-user"></span>
      <button id="btn-publish" class="btn-primary">发布素材</button>
      <button id="btn-logout" class="btn-ghost">退出</button>
    </div>
  </header>

  <!-- 主内容 -->
  <main id="app-main" hidden>
    <section id="view-home" class="view">
      <div class="page-head">
        <h2>作文素材广场</h2>
        <p>按点赞数排序，点赞越多越靠前；点赞相同则发布越晚越靠前</p>
      </div>
      <div id="cards" class="card-grid"></div>
    </section>

    <section id="view-my" class="view" hidden>
      <div class="page-head">
        <h2>个人中心</h2>
        <button class="btn-primary" data-action="publish">+ 发布素材</button>
      </div>
      <h3 class="block-title">我收藏的素材</h3>
      <div id="my-fav" class="card-grid"></div>
      <h3 class="block-title">我发布的素材</h3>
      <div id="my-mat" class="mat-list"></div>
    </section>

    <section id="view-review" class="view" hidden>
      <div class="page-head"><h2>待审核素材</h2><p>教师通过后将展示在主页</p></div>
      <div id="review-list" class="mat-list"></div>
    </section>
  </main>

  <div id="modal-root"></div>
  <div id="toast"></div>

  <script src="/app.js"></script>
</body>
</html>
